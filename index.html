<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse8 Stream</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0f111a; 
            color: #ffffff; 
            padding: 2rem; 
            margin: 0;
        }
        h1 {
            font-size: 2rem;
            color: #ffffff;
            border-bottom: 2px solid #2a2f45;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 1.5rem; 
        }
        .card { 
            background: #1a1d2e; 
            padding: 1.5rem; 
            border-radius: 8px; 
            border: 1px solid #2a2f45; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .source {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #8f9bb3;
            margin: 0 0 0.5rem 0;
        }
        .title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 1rem 0;
            line-height: 1.4;
        }
        .score-badge { 
            display: inline-block;
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc; 
            font-weight: 700; 
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .btn { 
            display: block; 
            text-align: center;
            margin-top: 1.5rem; 
            background: #ff0055; 
            color: white; 
            padding: 0.75rem 1rem; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: 600;
            transition: background 0.2s ease;
        }
        .btn:hover {
            background: #dd004b;
        }
    </style>
</head>
<body>
    <h1>Pulse8 Distribution Matrix</h1>
    <div class="grid" id="stream-view">Initializing secure aggregation layer...</div>

    <script>
        // Use the native Firestore REST Endpoint mapping
        const PROJECT_ID = "pulse8-592f2"; 
        const FIRESTORE_REST_URL = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/raw_videos`;

        async function launchViewer() {
            try {
                const response = await fetch(FIRESTORE_REST_URL);
                const data = await response.json();
                const container = document.getElementById("stream-view");
                
                if (!data || !data.documents) {
                    container.innerHTML = "<div class='card'><p>Ingestion database is currently empty. Waiting for the next automated Worker cycle.</p></div>";
                    return;
                }

                // Map Firestore's strongly typed REST schema to simple UI values
                const items = data.documents.map(doc => {
                    const fields = doc.fields;
                    return {
                        id: fields.id?.stringValue || "",
                        source: fields.source?.stringValue || "UNKNOWN",
                        title: fields.optimized_title?.stringValue || fields.title?.stringValue || "Untitled Asset",
                        score: fields.conversion_score?.integerValue || 50
                    };
                });

                // Sort by conversion score
                items.sort((a, b) => b.score - a.score);
                
                container.innerHTML = items.map(item => `
                    <div class="card">
                        <div>
                            <p class="source">${item.source}</p>
                            <h3 class="title">${item.title}</h3>
                            <span class="score-badge">Engine Score: ${item.score}/100</span>
                        </div>
                        <a href="https://pulse8-dataconnect.edoaura8.workers.dev/click/${item.id}" target="_blank" class="btn" rel="noopener sponsored">Watch Now</a>
                    </div>
                `).join("");
            } catch (err) {
                console.error("Interface pipeline extraction failure:", err);
                document.getElementById("stream-view").innerHTML = "<p style='color: #ff0055;'>Error establishing database connection pathway.</p>";
            }
        }

        launchViewer();
    </script>
</body>
</html>
