<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pulse8 Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/nsfwjs@2.4.0/dist/nsfwjs.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f111a; color: #fff; padding: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .card { background: #1a1d2e; padding: 1.5rem; border-radius: 8px; border: 1px solid #2a2f45; }
        .score { color: #00ffcc; font-weight: bold; }
        .btn { display: inline-block; margin-top: 1rem; background: #ff0055; color: white; padding: 0.5rem 1rem; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Pulse8 Auto-Curation Stream</h1>
    <div class="grid" id="stream-view">Loading optimized distribution points...</div>

    <script>
        const FIREBASE_REST_URL = "https://your-project-id.firebaseio.com/raw_videos.json";

        async function launchViewer() {
            try {
                const response = await fetch(FIREBASE_REST_URL);
                const data = await response.json();
                const container = document.getElementById("stream-view");
                
                if (!data) {
                    container.innerHTML = "Stream raw ingestion database currently empty. Waiting for next Worker cron trigger loop.";
                    return;
                }

                // Transform database map objects to array layout sorted by conversion scores
                const sortedItems = Object.values(data).sort((a, b) => b.conversion_score - a.conversion_score);
                
                container.innerHTML = sortedItems.map(item => `
                    <div class="card">
                        <h3>${item.optimized_title || item.title}</h3>
                        <p>Platform Origin: <strong>${item.source}</strong></p>
                        <p>Engine Score: <span class="score">${item.conversion_score}/100</span></p>
                        <a href="${item.link}" target="_blank" class="btn" rel="noopener sponsored">Route to Link</a>
                    </div>
                `).join("");
            } catch (err) {
                console.error("Interface pipeline extraction failure:", err);
            }
        }

        launchViewer();
    </script>
</body>
</html>
